version: '3.8'

# Smart ERP Next — Monitoring Stack
# Optional: For production monitoring and observability

services:
  # ── Prometheus for metrics collection ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smart-erp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Grafana for visualization ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: smart-erp-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - smart-erp-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Node Exporter for host metrics ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: smart-erp-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ── cAdvisor for container metrics ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: smart-erp-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Alertmanager for notifications ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: smart-erp-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Loki for logs aggregation ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: smart-erp-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Promtail for log collection ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: smart-erp-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/loki/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  smart-erp-network:
    external: true
    name: smart-erp-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local