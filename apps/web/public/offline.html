<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart ERP Next — Offline</title>
    <meta name="theme-color" content="#2563eb" />
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eff6ff; color: #111827; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      section { max-width: 520px; border-radius: 24px; background: white; box-shadow: 0 24px 80px rgba(37, 99, 235, 0.18); padding: 32px; }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { margin: 0 0 16px; line-height: 1.6; color: #4b5563; }
      button { border: 0; border-radius: 12px; background: #2563eb; color: white; padding: 12px 18px; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Bạn đang offline</h1>
        <p>Smart ERP Next vẫn giữ dữ liệu cục bộ đã được cache. Hãy kiểm tra kết nối mạng rồi thử tải lại.</p>
        <button type="button" onclick="window.location.reload()">Thử lại</button>
      </section>
    </main>
  </body>
</html>
