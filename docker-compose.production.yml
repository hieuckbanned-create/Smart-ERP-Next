# Smart ERP Next — Production Deployment
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  # ── PostgreSQL with persistent volume ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smart-erp-postgres-prod
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: ${DB_USER:-smart_erp_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smart_erp_prod} -d smart_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Redis for caching and session storage ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smart-erp-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── API Server (NestJS) ────────────────────────────────────────────────────────
  # Image published to ghcr.io on each release tag
  api:
    image: ghcr.io/hieuck/smart-erp-next:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    ports:
      - "${API_PORT:-3456}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smart_erp_prod}:${DB_PASSWORD}@postgres:5432/smart_erp
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      PORT: 3000
      AI_FORECAST_URL: http://ai-forecast:8000
      CORS_ORIGINS: ${CORS_ORIGINS}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # ── Web Dashboard (Next.js) ────────────────────────────────────────────────────
  web:
    image: ghcr.io/hieuck/smart-erp-next/web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NODE_ENV: production
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3457}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2

  # ── AI Forecasting Service ─────────────────────────────────────────────────────
  ai-forecast:
    image: ghcr.io/hieuck/smart-erp-next/ai-forecast:latest
    build:
      context: ./apps/ai-forecast
      dockerfile: Dockerfile
    container_name: smart-erp-ai-forecast-prod
    restart: unless-stopped
    ports:
      - "${AI_FORECAST_PORT:-8000}:8000"
    environment:
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Nginx Reverse Proxy (Optional) ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: smart-erp-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Backup Service (Daily database backups) ────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: smart-erp-backup-prod
    restart: unless-stopped
    volumes:
      - ./postgres-backup:/backup
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-smart_erp_prod}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: smart_erp
    command: >
      sh -c "chmod +x /backup.sh && echo '0 2 * * * /backup.sh' | crontab - && crond -f"
    depends_on:
      - postgres
    networks:
      - smart-erp-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  smart-erp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
