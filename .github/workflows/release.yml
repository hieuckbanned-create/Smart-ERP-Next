name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v0.5.0)
        required: true
        default: v0.5.0

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Apply database migrations
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
        run: pnpm exec drizzle-kit migrate

      - name: Run release quality gate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: release-e2e-secret
        run: |
          pnpm qa:release

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "Smart ERP Next $VERSION" \
            --notes-file release-notes.md \
            --draft=false

