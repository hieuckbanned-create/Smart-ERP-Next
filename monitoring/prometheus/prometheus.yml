global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: smart-erp-api-status
    metrics_path: /status/metrics
    scheme: http
    static_configs:
      - targets:
          - host.docker.internal:3456
        labels:
          service: api
          environment: local
