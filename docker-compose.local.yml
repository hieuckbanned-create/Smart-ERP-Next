# Hot-reload local development
# Usage: docker compose -f docker-compose.local.yml up -d
# Then: pnpm dev
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: ${DB_USER:-smart_erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smart_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_erp -d smart_erp"]

volumes:
  postgres_data:
